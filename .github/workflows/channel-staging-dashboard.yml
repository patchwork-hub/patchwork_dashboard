run-name: Deploy to Reusable Staging Patchwork Dashboard by @${{ github.actor }}

on:
  workflow_dispatch:
  push:
    branches:
      - staging

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Staging
    uses: patchwork-hub/patchwork_dashboard_infra/.github/workflows/deploy-staging.yml@main
    with:
      sha: ${{ github.sha }}
    secrets: inherit